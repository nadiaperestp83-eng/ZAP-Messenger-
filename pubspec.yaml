name: mithka
description: "Mithka — a cross-platform Telegram client (Flutter), built on TDLib."
publish_to: 'none'
version: 0.2.2+30

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management — mirrors SwiftUI's ObservableObject / @Published.
  provider: ^6.1.2

  # Persisted preferences (UserDefaults equivalent).
  shared_preferences: ^2.3.2

  # TDLib database / files directory (applicationSupportDirectory equivalent).
  path_provider: ^2.1.4

  # FFI bindings to tdjson (td_create_client_id / td_send / td_receive / td_execute).
  ffi: ^2.1.3

  # Chinese day-period date formatting.
  intl: ^0.20.2

  # Animated .tgs stickers (gzipped Lottie JSON).
  lottie: ^3.1.3
  archive: ^3.6.1

  # Voice notes: record + play Telegram's OGG/Opus (bundles libopus, so it works
  # on iOS where AVFoundation can't decode Opus). + mic permission.
  audio_session: ^0.2.3
  flutter_sound: ^9.28.0
  logger: ^2.7.0
  permission_handler: ^11.3.1

  # Media pickers for the composer's + panel: photos/camera, documents, location.
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  geolocator: ^13.0.2

  # QR business card (二维码名片) rendering.
  qr_flutter: ^4.1.0

  # Proper international phone-number formatting (pure-Dart libphonenumber port).
  dlibphonenumber: ^1.1.5

  # Open downloaded files in the system viewer; open external (non-t.me) links.
  open_filex: ^4.5.0
  url_launcher: ^6.3.1

  # Map-based location picker (OpenStreetMap tiles — no API key required).
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  apple_maps_flutter: ^1.4.0

  # Animated .webm (VP9 + alpha) video stickers. fvp is an MDK/FFmpeg backend for
  # video_player that decodes VP8/VP9 transparent WebM (Telegram video stickers) —
  # replaces the old ffmpeg_kit→WebP transcode.
  video_player: ^2.9.2
  fvp: ^0.37.2
  flutter_local_notifications: ^22.0.1
  google_fonts: ^8.1.0
  firebase_core: ^2.32.0
  firebase_analytics: ^10.10.7
  package_info_plus: ^9.0.1
  sentry_flutter: ^8.14.2
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Generates iOS/Android launcher icons from the Drachma app icon.
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/app_icon.png"
  ios: true
  android: true
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/penguin.png
    - assets/app_icon.png
