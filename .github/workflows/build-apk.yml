name: 📦 Build APK (arm64-v8a only)

# Builds a single release APK for modern 64-bit Android phones (arm64-v8a).
# No Play Store, no compatibility APK, no auto-generated release notes,
# no Telegram notification. The finished APK is uploaded as a workflow
# artifact — download it from the Actions run page (works fine from the
# GitHub mobile app: Actions tab -> this run -> Artifacts section).
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   TELEGRAM_API_ID, TELEGRAM_API_HASH   — from https://my.telegram.org
#
# Optional secrets (if absent, the APK is signed with a debug key instead —
# fine for personal/sideload use, not for Play Store):
#   ANDROID_KEYSTORE_BASE64              — base64 of your .jks keystore
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_PASSWORD
#   ANDROID_KEY_ALIAS

on:
  push:
    branches: [master, main, nightly, release]
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TDJSON_REPO: iebb/mithka-tdjson
  TDJSON_RELEASE_TAG: tdlib-1.8.66-1b08c83bc078-rebuild-29623073124-1

jobs:
  build:
    name: Build arm64-v8a APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Download prebuilt tdjson (arm64-v8a)
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          asset_url="https://github.com/${TDJSON_REPO}/releases/download/${TDJSON_RELEASE_TAG}/tdjson-android-arm64-v8a.zip"
          curl -fsSL "$asset_url" -o /tmp/tdjson-android.zip
          unzip -q -o /tmp/tdjson-android.zip -d /tmp/tdjson-android
          install -m 0644 "/tmp/tdjson-android/arm64-v8a/libtdjson.so" \
            "android/app/src/main/jniLibs/arm64-v8a/libtdjson.so"
          ls -lh android/app/src/main/jniLibs/arm64-v8a/libtdjson.so

      - name: Write secrets.dart
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          : "${TELEGRAM_API_ID:?set TELEGRAM_API_ID in repository secrets}"
          : "${TELEGRAM_API_HASH:?set TELEGRAM_API_HASH in repository secrets}"
          mkdir -p lib/config
          cat > lib/config/secrets.dart <<EOF
          class Secrets {
            static const int apiId = ${TELEGRAM_API_ID};
            static const String apiHash = '${TELEGRAM_API_HASH}';
            static bool get isConfigured => apiId != 0 && apiHash.isNotEmpty;
          }
          EOF

      - name: Determine signing mode
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode signing keystore (optional)
        if: steps.signing.outputs.has_keystore == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=${KEY_PASSWORD:-$STORE_PASSWORD}
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          echo "Using release keystore for signing."

      - name: Note debug signing (no keystore secret set)
        if: steps.signing.outputs.has_keystore != 'true'
        run: echo "No ANDROID_KEYSTORE_BASE64 secret found — APK will be debug-signed. Fine for sideloading, install over any previous debug build only."

      - name: Build arm64-v8a release APK
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --split-per-abi

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "dist/mithka-arm64-v8a-${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mithka-arm64-v8a-apk
          path: dist/*.apk
          retention-days: 30
