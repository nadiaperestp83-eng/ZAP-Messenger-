name: 🚀 Android Releases

# Builds per-ABI **release** APKs from nightly/release. Each ABI
# (arm64-v8a, armeabi-v7a) builds in its OWN parallel matrix job and downloads
# the latest prebuilt native TDLib (tdjson) asset from iebb/mithka-tdjson. A
# final job creates the version tag from pubspec.yaml and publishes all the APKs:
# nightly creates a dated pre-release, release creates a dated stable release.
#
# master never builds APKs. The daily sync workflow merges new master commits
# into nightly, increments the patch version once, and dispatches this workflow.
#
# Required repository secrets:
#   TELEGRAM_API_ID, TELEGRAM_API_HASH   — baked into lib/config/secrets.dart
#   ANDROID_KEYSTORE_BASE64              — base64 of the upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD            — store password
#   ANDROID_KEY_PASSWORD                 — key password
#   ANDROID_KEY_ALIAS                    — key alias (e.g. nekoko)
# The google-play-production environment also requires:
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON      — Play Developer API service account
# Without the ANDROID_* secrets the build still runs but is debug-signed.

on:
  push:
    branches: [nightly, release]
  workflow_dispatch:

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/nightly' }}

permissions:
  contents: write

env:
  # Keep each Mithka release reproducible by pinning an immutable TDLib build.
  TDJSON_RELEASE_TAG: tdlib-1.8.66-1b08c83bc078

jobs:
  prepare:
    name: Read pubspec version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      version_code: ${{ steps.version.outputs.version_code }}
      play_version_code: ${{ steps.version.outputs.play_version_code }}
      build_stamp: ${{ steps.version.outputs.build_stamp }}
      release_date: ${{ steps.version.outputs.release_date }}
      artifact_label: ${{ steps.version.outputs.artifact_label }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      release_channel: ${{ steps.version.outputs.release_channel }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      make_latest: ${{ steps.version.outputs.make_latest }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Read version from pubspec.yaml
        id: version
        run: |
          raw_version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          test -n "$raw_version"
          app_version="${raw_version%%+*}"
          version_code="${raw_version##*+}"
          test "$raw_version" != "$version_code"
          case "$version_code" in
            ''|*[!0-9]*) echo "Invalid Android version code: $version_code" >&2; exit 1 ;;
          esac
          build_stamp="$(date -u '+%y%m%d%H')"
          release_date="$(date -u '+%Y-%m-%d')"
          play_version_code="$(date -u '+%s')"
          if [ "$play_version_code" -gt 2100000000 ]; then
            echo "Generated Google Play version code exceeds Android's limit" >&2
            exit 1
          fi
          short_sha="${GITHUB_SHA::7}"
          branch_name="${GITHUB_REF_NAME:-${GITHUB_REF#refs/heads/}}"
          case "$branch_name" in
            nightly)
              release_tag="v${app_version}-nightly.${release_date}.${short_sha}"
              release_name="v${app_version} Nightly ${release_date} (${short_sha})"
              release_channel="nightly pre-release"
              artifact_label="${app_version}-nightly-${release_date}-${short_sha}"
              prerelease="true"
              make_latest="false"
              ;;
            release)
              release_tag="v$app_version"
              release_name="Mithka $app_version · $release_date"
              release_channel="release"
              artifact_label="${app_version}-${release_date}"
              prerelease="false"
              make_latest="true"
              ;;
            *)
              echo "Unsupported release branch: $branch_name" >&2
              exit 1
              ;;
          esac
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "play_version_code=$play_version_code" >> "$GITHUB_OUTPUT"
          echo "build_stamp=$build_stamp" >> "$GITHUB_OUTPUT"
          echo "release_date=$release_date" >> "$GITHUB_OUTPUT"
          echo "artifact_label=$artifact_label" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "release_channel=$release_channel" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "make_latest=$make_latest" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "Release tag: $release_tag"
          echo "Release channel: $release_channel"
          echo "Android version code: $version_code"
          echo "Google Play version code: $play_version_code"
          echo "GMT build stamp: $build_stamp"
          echo "Release date: $release_date"

  build:
    name: Build ${{ matrix.abi }} APK
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            target: android-arm64
          - abi: armeabi-v7a
            target: android-arm
    env:
      TDJSON_REPO: iebb/mithka-tdjson
      # fvp defaults Android MDK downloads to SourceForge nightly builds. Pin a
      # stable MDK release to avoid native-load crashes from broken nightlies.
      FVP_DEPS_URL: https://github.com/wang-bin/mdk-sdk/releases/download/v0.36.0
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Android NDK 28.2.13676358
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;28.2.13676358" >/dev/null 2>&1 || \
          yes | sdkmanager "ndk;28.2.13676358" >/dev/null 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Resolve tdjson release
        id: tdjson_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${TDJSON_RELEASE_TAG:-}" ]; then
            tag="$TDJSON_RELEASE_TAG"
          else
            tag="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$TDJSON_REPO/releases?per_page=100" \
              | python3 -c '
          import json, sys
          required = {
              "tdjson-android-arm64-v8a.zip",
              "tdjson-android-armeabi-v7a.zip",
              "tdjson-android-x86_64.zip",
          }
          releases = json.load(sys.stdin)
          print(next(
              release["tag_name"]
              for release in releases
              if required.issubset({
                  asset["name"] for asset in release.get("assets", [])
              })
          ))
          ')"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "asset_url=https://github.com/$TDJSON_REPO/releases/download/$tag/tdjson-android-${{ matrix.abi }}.zip" >> "$GITHUB_OUTPUT"
          echo "Using tdjson release $tag"

      - name: Cache jniLibs (${{ matrix.abi }})
        id: jnilibs-cache
        uses: actions/cache@v4
        with:
          path: android/app/src/main/jniLibs/${{ matrix.abi }}
          key: jnilibs-${{ runner.os }}-${{ steps.tdjson_release.outputs.tag }}-${{ matrix.abi }}
          restore-keys: |
            jnilibs-${{ runner.os }}-

      - name: Check cached tdjson
        id: tdjson
        run: |
          if [ -s "android/app/src/main/jniLibs/${{ matrix.abi }}/libtdjson.so" ]; then
            echo "cached=true" >> "$GITHUB_OUTPUT"
            ls -lh "android/app/src/main/jniLibs/${{ matrix.abi }}/libtdjson.so"
          else
            echo "cached=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download prebuilt tdjson (${{ matrix.abi }})
        if: steps.tdjson.outputs.cached != 'true'
        run: |
          mkdir -p "android/app/src/main/jniLibs/${{ matrix.abi }}"
          curl -fsSL "${{ steps.tdjson_release.outputs.asset_url }}" -o /tmp/tdjson-android.zip
          unzip -q -o /tmp/tdjson-android.zip -d /tmp/tdjson-android
          install -m 0644 "/tmp/tdjson-android/${{ matrix.abi }}/libtdjson.so" \
            "android/app/src/main/jniLibs/${{ matrix.abi }}/libtdjson.so"
          ls -lh "android/app/src/main/jniLibs/${{ matrix.abi }}/libtdjson.so"

      - name: Flutter dependencies
        run: flutter pub get

      - name: Write Firebase Android config
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          : "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64:?set FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 in repository secrets}"
          mkdir -p android/app
          printf '%s' "$FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64" | base64 -d > android/app/google-services.json

      - name: Write secrets.dart
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart <<EOF
          class Secrets {
            static const int apiId = ${TELEGRAM_API_ID:-0};
            static const String apiHash = '${TELEGRAM_API_HASH}';
            static bool get isConfigured => apiId != 0 && apiHash.isNotEmpty;
          }
          EOF

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        if: ${{ env.KEYSTORE_B64 != '' }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=${KEY_PASSWORD:-$STORE_PASSWORD}
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build ${{ matrix.abi }} release APK
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          # Each matrix job already targets one ABI. Flutter's split mode adds
          # ABI * 1000 to versionCode (arm64 adds 2000), so keep it disabled.
          flutter build apk --release \
            --target-platform ${{ matrix.target }} \
            --build-name="${{ needs.prepare.outputs.app_version }}" \
            --build-number="${{ needs.prepare.outputs.build_stamp }}" \
            --dart-define="GIT_COMMIT=${{ needs.prepare.outputs.short_sha }}" \
            --dart-define="CI_BUILD_STAMP=${{ needs.prepare.outputs.build_stamp }}" \
            --dart-define="SENTRY_DSN=$SENTRY_DSN"

      - name: Verify APK version code
        run: |
          apk="build/app/outputs/flutter-apk/app-release.apk"
          analyzer="$ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer"
          if [ ! -x "$analyzer" ]; then
            analyzer="$(command -v apkanalyzer)"
          fi
          actual_version_code="$("$analyzer" manifest version-code "$apk")"
          expected_version_code="${{ needs.prepare.outputs.build_stamp }}"
          if [ "$actual_version_code" != "$expected_version_code" ]; then
            echo "Expected APK version code $expected_version_code, got $actual_version_code" >&2
            exit 1
          fi
          echo "APK version code: $actual_version_code"

      - name: Rename APK
        run: |
          mkdir -p dist
          cp "build/app/outputs/flutter-apk/app-release.apk" \
            "dist/mithka-${{ needs.prepare.outputs.artifact_label }}-${{ matrix.abi }}-release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.abi }}-${{ needs.prepare.outputs.release_date }}-${{ needs.prepare.outputs.build_stamp }}
          path: dist/mithka-${{ needs.prepare.outputs.artifact_label }}-${{ matrix.abi }}-release.apk
          if-no-files-found: error

  google-play:
    name: Publish AAB to Google Play
    if: github.ref == 'refs/heads/release'
    needs: prepare
    runs-on: ubuntu-latest
    environment: google-play-production
    concurrency:
      group: google-play-production
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      TDJSON_REPO: iebb/mithka-tdjson
      FVP_DEPS_URL: https://github.com/wang-bin/mdk-sdk/releases/download/v0.36.0
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Android NDK 28.2.13676358
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;28.2.13676358" >/dev/null 2>&1 || \
          yes | sdkmanager "ndk;28.2.13676358" >/dev/null 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Resolve tdjson release
        id: tdjson_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${TDJSON_RELEASE_TAG:-}" ]; then
            tag="$TDJSON_RELEASE_TAG"
          else
            tag="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$TDJSON_REPO/releases?per_page=100" \
              | python3 -c '
          import json, sys
          required = {
              "tdjson-android-arm64-v8a.zip",
              "tdjson-android-armeabi-v7a.zip",
              "tdjson-android-x86_64.zip",
          }
          releases = json.load(sys.stdin)
          print(next(
              release["tag_name"]
              for release in releases
              if required.issubset({
                  asset["name"] for asset in release.get("assets", [])
              })
          ))
          ')"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Using tdjson release $tag"

      - name: Cache Android tdjson libraries
        id: jnilibs-cache
        uses: actions/cache@v4
        with:
          path: android/app/src/main/jniLibs
          key: jnilibs-${{ runner.os }}-${{ steps.tdjson_release.outputs.tag }}-play-aab
          restore-keys: |
            jnilibs-${{ runner.os }}-${{ steps.tdjson_release.outputs.tag }}-
            jnilibs-${{ runner.os }}-

      - name: Download prebuilt tdjson libraries
        env:
          TDJSON_RELEASE_TAG: ${{ steps.tdjson_release.outputs.tag }}
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64; do
            output="android/app/src/main/jniLibs/$abi/libtdjson.so"
            if [ -s "$output" ]; then
              ls -lh "$output"
              continue
            fi
            archive="$RUNNER_TEMP/tdjson-android-$abi.zip"
            unpacked="$RUNNER_TEMP/tdjson-android-$abi"
            curl -fsSL \
              "https://github.com/$TDJSON_REPO/releases/download/$TDJSON_RELEASE_TAG/tdjson-android-$abi.zip" \
              -o "$archive"
            rm -rf "$unpacked"
            mkdir -p "$unpacked" "$(dirname "$output")"
            unzip -q -o "$archive" -d "$unpacked"
            install -m 0644 "$unpacked/$abi/libtdjson.so" "$output"
            ls -lh "$output"
          done

      - name: Flutter dependencies
        run: flutter pub get

      - name: Write Firebase Android config
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          : "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64:?set FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 in repository secrets}"
          mkdir -p android/app
          printf '%s' "$FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64" | base64 -d > android/app/google-services.json

      - name: Write Telegram client credentials
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          : "${TELEGRAM_API_ID:?set TELEGRAM_API_ID in repository secrets}"
          : "${TELEGRAM_API_HASH:?set TELEGRAM_API_HASH in repository secrets}"
          mkdir -p lib/config
          cat > lib/config/secrets.dart <<EOF
          class Secrets {
            static const int apiId = $TELEGRAM_API_ID;
            static const String apiHash = '$TELEGRAM_API_HASH';
            static bool get isConfigured => apiId != 0 && apiHash.isNotEmpty;
          }
          EOF

      - name: Decode Play signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          : "${KEYSTORE_B64:?set ANDROID_KEYSTORE_BASE64 in repository secrets}"
          : "${STORE_PASSWORD:?set ANDROID_KEYSTORE_PASSWORD in repository secrets}"
          : "${KEY_ALIAS:?set ANDROID_KEY_ALIAS in repository secrets}"
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=${KEY_PASSWORD:-$STORE_PASSWORD}
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build signed release AAB
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter build appbundle --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --build-name="${{ needs.prepare.outputs.app_version }}" \
            --build-number="${{ needs.prepare.outputs.play_version_code }}" \
            --dart-define="GIT_COMMIT=${{ needs.prepare.outputs.short_sha }}" \
            --dart-define="CI_BUILD_STAMP=${{ needs.prepare.outputs.build_stamp }}" \
            --dart-define="GOOGLE_PLAY_BUILD=true" \
            --dart-define="SENTRY_DSN=$SENTRY_DSN"
          jarsigner -verify build/app/outputs/bundle/release/app-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-play-aab-${{ needs.prepare.outputs.app_version }}+${{ needs.prepare.outputs.version_code }}
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Submit production release to Google Play
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ad.neko.mithka
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: production
          status: completed
          releaseName: Mithka ${{ needs.prepare.outputs.app_version }} · ${{ needs.prepare.outputs.release_date }}
          whatsNewDirectory: distribution/google-play/whatsnew
          changesNotSentForReview: false

  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all ABI APKs
        uses: actions/download-artifact@v4
        with:
          path: apks
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR apks

      - name: Create release tag
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          fi
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "$RELEASE_TAG"

      - name: Remove old APK assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            exit 0
          fi
          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' \
            | grep '^mithka-.*-release\.apk$' \
            | while read -r asset; do
                gh release delete-asset "$RELEASE_TAG" "$asset" --yes
              done

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          make_latest: ${{ needs.prepare.outputs.make_latest }}
          files: apks/*.apk
          fail_on_unmatched_files: true

      - name: Notify Telegram channel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CI_CHANNEL: ${{ secrets.TELEGRAM_CI_CHANNEL }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_CHANNEL: ${{ needs.prepare.outputs.release_channel }}
          RELEASE_DATE: ${{ needs.prepare.outputs.release_date }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.release_tag }}
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CI_CHANNEL"
          response="$(curl -fsS \
            -F "chat_id=$TELEGRAM_CI_CHANNEL" \
            -F "text=🚀 Mithka $RELEASE_CHANNEL $RELEASE_TAG · $RELEASE_DATE

          APKs: $RELEASE_URL" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage")"
          # Release CI announcements should stay in the channel history but not
          # become pinned. If another automation or Telegram-side behavior pins
          # the just-sent message, unpin that exact message best-effort.
          message_id="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("result", {}).get("message_id", ""))' <<< "$response")"
          if [ -n "$message_id" ]; then
            curl -fsS \
              -F "chat_id=$TELEGRAM_CI_CHANNEL" \
              -F "message_id=$message_id" \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/unpinChatMessage" \
              >/dev/null 2>&1 || true
          fi
