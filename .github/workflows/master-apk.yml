name: 🧪 Master APK

# Every push to master builds a signed arm64-v8a APK and posts it to the
# configured Telegram CI channel. This is intentionally not a release workflow:
# it does not bump pubspec.yaml, create tags, or publish GitHub Releases.

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: master-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-upload:
    name: Build arm64-v8a APK and upload
    runs-on: ubuntu-latest
    env:
      ABI: arm64-v8a
      TARGET_PLATFORM: android-arm64
      NDK_VERSION: 28.2.13676358
      TDJSON_REPO: iebb/mithka-tdjson
      # fvp defaults Android MDK downloads to SourceForge nightly builds. Pin a
      # stable MDK release to avoid native-load crashes from broken nightlies.
      FVP_DEPS_URL: https://github.com/wang-bin/mdk-sdk/releases/download/v0.36.0
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Android NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;$NDK_VERSION" >/dev/null 2>&1 || \
          yes | sdkmanager "ndk;$NDK_VERSION" >/dev/null 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - name: Resolve tdjson release
        id: tdjson_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${TDJSON_RELEASE_TAG:-}" ]; then
            tag="$TDJSON_RELEASE_TAG"
          else
            tag="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$TDJSON_REPO/releases/latest" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "asset_url=https://github.com/$TDJSON_REPO/releases/download/$tag/tdjson-android-$ABI.zip" >> "$GITHUB_OUTPUT"
          echo "Using tdjson release $tag"

      - name: Cache jniLibs (${{ env.ABI }})
        id: jnilibs-cache
        uses: actions/cache@v4
        with:
          path: android/app/src/main/jniLibs/${{ env.ABI }}
          key: jnilibs-${{ runner.os }}-${{ steps.tdjson_release.outputs.tag }}-${{ env.ABI }}
          restore-keys: |
            jnilibs-${{ runner.os }}-

      - name: Check cached tdjson
        id: tdjson
        run: |
          if [ -s "android/app/src/main/jniLibs/$ABI/libtdjson.so" ]; then
            echo "cached=true" >> "$GITHUB_OUTPUT"
            ls -lh "android/app/src/main/jniLibs/$ABI/libtdjson.so"
          else
            echo "cached=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download prebuilt tdjson (${{ env.ABI }})
        if: steps.tdjson.outputs.cached != 'true'
        run: |
          mkdir -p "android/app/src/main/jniLibs/$ABI"
          curl -fsSL "${{ steps.tdjson_release.outputs.asset_url }}" -o /tmp/tdjson-android.zip
          unzip -q -o /tmp/tdjson-android.zip -d /tmp/tdjson-android
          install -m 0644 "/tmp/tdjson-android/$ABI/libtdjson.so" \
            "android/app/src/main/jniLibs/$ABI/libtdjson.so"
          ls -lh "android/app/src/main/jniLibs/$ABI/libtdjson.so"

      - name: Flutter dependencies
        run: flutter pub get

      - name: Build metadata
        id: build-meta
        run: |
          raw_version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          test -n "$raw_version"
          app_version="${raw_version%%+*}"
          build_stamp="$(date -u '+%y%m%d%H')"
          apk_name="mithka-${app_version}+${build_stamp}-master-${GITHUB_SHA::7}-${ABI}-release.apk"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "build_stamp=$build_stamp" >> "$GITHUB_OUTPUT"
          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"
          echo "GMT build stamp: $build_stamp"

      - name: Write Firebase Android config
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          : "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64:?set FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 in repository secrets}"
          mkdir -p android/app
          printf '%s' "$FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64" | base64 -d > android/app/google-services.json

      - name: Write secrets.dart
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart <<EOF
          class Secrets {
            static const int apiId = ${TELEGRAM_API_ID:-0};
            static const String apiHash = '${TELEGRAM_API_HASH}';
            static bool get isConfigured => apiId != 0 && apiHash.isNotEmpty;
          }
          EOF

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No Android signing keystore configured; release APK will use fallback signing."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=${KEY_PASSWORD:-$STORE_PASSWORD}
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build arm64-v8a release APK
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter build apk --release --split-per-abi \
            --target-platform "$TARGET_PLATFORM" \
            --build-name="${{ steps.build-meta.outputs.app_version }}" \
            --build-number="${{ steps.build-meta.outputs.build_stamp }}" \
            --dart-define="GIT_COMMIT=${GITHUB_SHA::7}" \
            --dart-define="CI_BUILD_STAMP=${{ steps.build-meta.outputs.build_stamp }}" \
            --dart-define="SENTRY_DSN=$SENTRY_DSN"

      - name: Rename APK
        run: |
          mkdir -p dist
          cp "build/app/outputs/flutter-apk/app-${ABI}-release.apk" \
            "dist/${{ steps.build-meta.outputs.apk_name }}"

      - name: Upload APK artifact
        id: upload-apk
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ env.ABI }}-${{ steps.build-meta.outputs.build_stamp }}
          path: dist/${{ steps.build-meta.outputs.apk_name }}
          if-no-files-found: error

      - name: Upload APK to Telegram channel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CI_CHANNEL: ${{ secrets.TELEGRAM_CI_CHANNEL }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          APK_PATH: dist/${{ steps.build-meta.outputs.apk_name }}
          ARTIFACT_URL: ${{ steps.upload-apk.outputs.artifact-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CI_CHANNEL"

          build_date="$(date -u '+%Y-%m-%d %H:%M UTC')"
          commit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          commit_message="$(git log -1 --pretty=%s | tr '\n' ' ' | cut -c1-180)"
          caption="$(printf '🧪 Mithka master %s · arm64-v8a · %s\nDate: %s\nCommit: %s\nMessage: %s' \
            "${GITHUB_SHA::7}" "${{ steps.build-meta.outputs.build_stamp }}" "$build_date" "$commit_url" "$commit_message")"
          response=/tmp/telegram-response.json

          upload_document() {
            local path="$1"
            local caption="$2"
            local bot_api_url="${3:-https://api.telegram.org}"
            curl -sS -o "$response" -w "%{http_code}" \
              -F "chat_id=$TELEGRAM_CI_CHANNEL" \
              -F "document=@$path" \
              -F "caption=$caption" \
              "${bot_api_url}/bot${TELEGRAM_BOT_TOKEN}/sendDocument"
          }

          send_message() {
            local text="$1"
            curl -fsS \
              -F "chat_id=$TELEGRAM_CI_CHANNEL" \
              -F "text=$text" \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
          }

          max_bytes=$((50 * 1024 * 1024))
          apk_size="$(stat -c '%s' "$APK_PATH")"

          if [ "$apk_size" -lt "$max_bytes" ]; then
            status="$(upload_document "$APK_PATH" "$caption")"
            if [ "$status" = "200" ]; then
              exit 0
            fi
            cat "$response"
            exit 1
          fi

          : "${TELEGRAM_API_ID:?set TELEGRAM_API_ID in repository secrets}"
          : "${TELEGRAM_API_HASH:?set TELEGRAM_API_HASH in repository secrets}"
          mkdir -p "$RUNNER_TEMP/telegram-bot-api"
          docker run -d --rm \
            --name mithka-telegram-bot-api \
            -p 127.0.0.1:8081:8081 \
            -v "$RUNNER_TEMP/telegram-bot-api:/var/lib/telegram-bot-api" \
            -e TELEGRAM_API_ID="$TELEGRAM_API_ID" \
            -e TELEGRAM_API_HASH="$TELEGRAM_API_HASH" \
            -e TELEGRAM_LOCAL=1 \
            aiogram/telegram-bot-api:latest
          trap 'docker stop mithka-telegram-bot-api >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:8081/bot${TELEGRAM_BOT_TOKEN}/getMe" >/dev/null; then
              break
            fi
            if [ "$attempt" = "30" ]; then
              docker logs mithka-telegram-bot-api || true
              exit 1
            fi
            sleep 1
          done

          status="$(upload_document "$APK_PATH" "$caption" "http://127.0.0.1:8081")"
          if [ "$status" = "200" ]; then
            exit 0
          fi
          cat "$response"
          send_message "$caption

          APK upload failed.
          Artifact: $ARTIFACT_URL
          Run: $RUN_URL"
          exit 1
